name: CI

# The workflow always triggers so `ci-ok` (the required status check) always
# reports; an internal change-detection gate decides which jobs actually run.
# Build/test runs only when build-affecting files change; Markdown-only
# changes run the lighter docs-validate job instead. The weekly cron still
# runs the full suite unconditionally as a backstop.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"  # weekly cargo audit / cargo deny refresh

permissions:
  contents: read

env:
  # The parity-oracle pin (ADR 0018): the released binary CI validates with.
  ORACLE_VERSION: v0.48.0

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # retired/** is deliberately in neither group: documentation, not source.
            build:
              - "crates/**"
              - "fixtures/**"
              - "examples/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/workflows/ci.yml"
            docs:
              - "**/*.md"
              - ".norn/**"

  ci:
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'schedule' || needs.changes.outputs.build == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Install shellcheck (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck

      - name: cargo fmt --check
        run: cargo fmt --check

      # Installed BEFORE cargo test so `norn` (the pinned parity oracle) is on
      # PATH during the test run: tests/oracle_smoke.rs then runs for real
      # instead of skipping. The pre-rewrite binary smokes (install, --help,
      # completions, manpage) return as their surfaces reach parity (ADR 0018);
      # until then the pinned oracle release runs the vault validations.
      - name: install oracle norn (pinned release)
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/dbtlr/norn/releases/download/$ORACLE_VERSION/norn-run-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      - name: cargo build --workspace --release --locked
        run: cargo build --workspace --release --locked

      - name: fixture-gen smoke (oracle)
        shell: bash
        run: |
          ./target/release/norn-fixtures "$RUNNER_TEMP/fx-clean" --profile clean --seed 1
          norn -C "$RUNNER_TEMP/fx-clean" validate --summary --format json | tee /dev/stderr | grep -q '"findings": 0'
          ./target/release/norn-fixtures "$RUNNER_TEMP/fx-zoo" --profile zoo --seed 1
          norn -C "$RUNNER_TEMP/fx-zoo" validate --summary --format json | tee /dev/stderr | { ! grep -q '"findings": 0'; }

      - name: fixture validate (oracle)
        run: norn -C fixtures/basic validate --summary --format json

      - name: repo self-validate (oracle)
        run: norn -C . validate --summary --format json

      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check

      - name: shellcheck
        run: shellcheck examples/repair-recipe.sh

  # Light path for Markdown-only changes: the pinned oracle release runs the
  # repo self-validation, which enforces the docs frontmatter rules in
  # .norn/config.yaml. No Rust build. Skipped when the full ci job runs.
  docs-validate:
    needs: changes
    if: ${{ !cancelled() && github.event_name != 'schedule' && needs.changes.outputs.docs == 'true' && needs.changes.outputs.build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: install oracle norn (pinned release)
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/dbtlr/norn/releases/download/$ORACLE_VERSION/norn-run-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: fixture validate (oracle)
        run: norn -C fixtures/basic validate --summary --format json

      - name: repo self-validate (oracle)
        run: norn -C . validate --summary --format json

  # Rewrite work (ADR 0018) bases on the long-lived rewrite/0017 branch and
  # never targets main; the single graduation switchover PR lands from a
  # dedicated switchover branch, so this guard stays absolute.
  branch-guard:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && startsWith(github.head_ref, 'rewrite/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Reject rewrite/** PRs targeting main
        run: |
          echo "::error::rewrite/** branches must target rewrite/0017, not main (ADR 0018)."
          echo "::error::The graduation switchover lands from a dedicated switchover branch."
          exit 1

  # The single required status check: succeeds when the jobs that were
  # supposed to run succeeded (skipped-by-design counts as success), fails
  # on any failure or cancellation.
  ci-ok:
    needs: [changes, ci, docs-validate, branch-guard]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          results="${{ needs.changes.result }} ${{ needs.ci.result }} ${{ needs['docs-validate'].result }} ${{ needs['branch-guard'].result }}"
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "a required job failed or was cancelled"
              exit 1
            fi
          done
          echo "ok"
