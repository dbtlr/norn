name: CI

# The workflow always triggers so `ci-ok` (the required status check) always
# reports; an internal change-detection gate decides which jobs actually run.
# Build/test runs only when build-affecting files change; Markdown-only
# changes run the lighter docs-validate job instead. The weekly cron still
# runs the full suite unconditionally as a backstop.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"  # weekly cargo audit / cargo deny refresh

permissions:
  contents: read

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - "src/**"
              - "tests/**"
              - "fixtures/**"
              - "examples/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - "build.rs"
              - ".github/workflows/ci.yml"
            docs:
              - "**/*.md"
              - ".norn/**"

  ci:
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'schedule' || needs.changes.outputs.build == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Install shellcheck (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      - name: cargo build -p norn-run --release --locked
        run: cargo build -p norn-run --release --locked

      - name: cargo install --path . --locked
        run: cargo install --path . --locked

      - name: norn --help
        run: norn --help

      - name: completions bash smoke
        run: norn completions init bash > /tmp/norn.bash && test -s /tmp/norn.bash

      - name: completions zsh smoke
        run: norn completions init zsh > /tmp/_norn && test -s /tmp/_norn

      - name: completions fish smoke
        run: norn completions init fish > /tmp/norn.fish && test -s /tmp/norn.fish

      - name: manpage smoke
        run: norn manpage > /tmp/norn.1 && test -s /tmp/norn.1

      - name: fixture validate
        run: norn -C fixtures/basic validate --summary --format json

      - name: repo self-validate
        run: norn -C . validate --summary --format json

      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check

      - name: shellcheck
        run: shellcheck examples/repair-recipe.sh

  # Light path for Markdown-only changes: build once (debug, cached) and run
  # the repo self-validation, which enforces the docs frontmatter rules in
  # .norn/config.yaml. Skipped when the full ci job runs (it self-validates).
  docs-validate:
    needs: changes
    if: ${{ !cancelled() && github.event_name != 'schedule' && needs.changes.outputs.docs == 'true' && needs.changes.outputs.build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build -p norn-run --locked
        run: cargo build -p norn-run --locked

      - name: fixture validate
        run: ./target/debug/norn -C fixtures/basic validate --summary --format json

      - name: repo self-validate
        run: ./target/debug/norn -C . validate --summary --format json

  # The single required status check: succeeds when the jobs that were
  # supposed to run succeeded (skipped-by-design counts as success), fails
  # on any failure or cancellation.
  ci-ok:
    needs: [changes, ci, docs-validate]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          results="${{ needs.changes.result }} ${{ needs.ci.result }} ${{ needs['docs-validate'].result }}"
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "a required job failed or was cancelled"
              exit 1
            fi
          done
          echo "ok"
