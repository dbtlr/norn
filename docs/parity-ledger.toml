# Divergence ledger (ADR 0018): every intended old->new behavior difference,
# decision-gated. The parity runner passes a differing case ONLY when an
# entry here covers it; a differing case with no entry is drift (CI fails).
# An entry whose cases all currently MATCH is stale and fails the run —
# entries cannot rot.
#
# Format:
#
# [[entry]]
# id = "PD-001"                      # stable, never reused
# surface = "find --format json"     # human-readable surface name
# cases = ["find-json-basic"]        # explicit case ids the entry covers
# old = "what the oracle does"
# new = "what the rewrite does"
# reason = "decided-better"          # or "discovered-inconsistency"
# decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"
#
# Runner-side rules (crates/norn-parity/src/ledger.rs), all enforced:
# - Unknown `reason`, a missing required field, a duplicate entry id, or an
#   entry citing an unknown case id is a load error (runner exit 2).
# - An entry may only cite cases whose surface is already ported (the case's
#   own `ported` flag). Divergence can only be observed on a ported surface,
#   so an entry for an unported one is premature — a load error (exit 2).
# - A case cited by more than one entry is also a load error — a Diverged
#   verdict must resolve to exactly one entry.
# - meta.oracle_version must match the oracle binary's actual `--version`
#   output, or the run aborts (exit 2) rather than silently comparing
#   against an unpinned or floated oracle. Enforced by the comparison modes
#   AND by --consistency (a pin-scoped trust claim); --self-check is
#   ledger-blind (no ledger, no pin) so a case set can be vetted against a
#   new oracle before the ledger is updated.

[meta]
oracle_version = "0.48.1"   # the pinned oracle; the runner verifies `--version` against this

# The registered-vault namespace (ADR 0017) is a new-world surface the pinned
# oracle (0.48) predates. It appears in the top-level `--help` COMMANDS list as
# one extra `vault` row after every ported oracle command. The addressing
# rework (NRN-345) additionally reshapes the GLOBAL OPTIONS block on EVERY
# command: the global `--config` is deleted (per-vault config is resolver-derived
# under ADR 0017, `[vaults.<name>].config -> <root>/.norn/config.yaml`, not a
# free-floating global path) and the `--vault NAME` global is unhidden (the
# summoner consumes it to pick the routed vault). help-bare carries both the
# command-list and the global-options change; help-validate / help-find carry
# only the global-options change. Live help examples (the "--help builds the
# cache" behavior) do NOT diverge: under the harness the oracle opens a
# freshly-created empty cache and emits none, matching the rewrite.
#
# These two byte-exact help cases pin the top-level page and two representative
# subcommands; the generated help-parity walker
# (crates/norn-parity/tests/help_walker.rs) enforces this SAME global-options
# reshape across EVERY enumerated verb and nested group, so PD-101 / PD-102 are
# the standing decision record for a divergence the walker checks on the whole
# clap tree, not just the three cased surfaces.
[[entry]]
id = "PD-101"
surface = "--help (top-level command list + GLOBAL OPTIONS)"
cases = ["help-bare"]
old = "the 22-command list ends at `audit` with no registered-vault namespace; GLOBAL OPTIONS lists `--config` and has no `--vault`; the `-C/--cwd` description is truncated at 70 chars with an ellipsis in `--help`"
new = "a `vault` namespace (register/unregister/list/set) is listed after `audit`, exposing the ADR 0017 registry; GLOBAL OPTIONS drops `--config` and adds `--vault NAME`; the `-C/--cwd` description is shown in FULL (unclamped) in `--help`, only the concise line in `-h` (NRN-335)"
reason = "decided-better"
decision = "docs/decisions/0017-registered-vaults-summoned-owners.md"

# The per-command GLOBAL OPTIONS change (NRN-345) on the two ported subcommand
# help surfaces. Both drop `--config` and gain `--vault NAME`; neither has a
# command list, so the GLOBAL OPTIONS block is their sole divergence.
[[entry]]
id = "PD-102"
surface = "<command> --help (GLOBAL OPTIONS block)"
cases = ["help-validate", "help-find"]
old = "GLOBAL OPTIONS lists `--config <YAML config file>` and has no `--vault`; `-C/--cwd` is truncated at 70 chars in `--help`; on `find --help`, `--no-limit` reads 'Overrides --limit', `--starts-at` reads '1-indexed ... Default 1', and `--all-cols` reads 'Mutually exclusive with --col'"
new = "GLOBAL OPTIONS drops `--config` (config is resolver-derived under ADR 0017) and adds `--vault NAME` (registered-vault targeting the summoner consumes); `-C/--cwd` shows its full description unclamped in `--help` (NRN-335); on `find --help` the Sort-and-paging / Output help text also changes — `--no-limit` and `--all-cols` state last-wins and `--starts-at` states zero-indexing / Default 0 (NRN-331 / NRN-332)"
reason = "decided-better"
decision = "docs/decisions/0017-registered-vaults-summoned-owners.md"

# ADR 0019 (code blocks are opaque): a `^block-id` defined only INSIDE a fenced
# code block is literal sample text, not an anchor, so a `[[Note#^id]]` reference
# to it no longer resolves. The anchor universe shrinks vs. the oracle, which
# registers code-fenced block-ids. `edge/code-linker.md` links to a block-id that
# lives only inside a fence in `edge/code-anchor.md`; the isolated text-edge
# fixture keeps this off every shared zoo/clean case.
[[entry]]
id = "PD-103"
surface = "get --col .outgoing_links,.unresolved_links (code-fenced block-id resolution)"
cases = ["text-edge-code-fenced-block-id-link"]
old = "a `^block-id` inside a fenced code block is a real anchor, so `[[code-anchor#^blkincode]]` resolves (a resolved outgoing link)"
new = "code is opaque (ADR 0019): the code-fenced `^blkincode` is not an anchor, so the reference is unresolved (block-ref-missing)"
reason = "decided-better"
decision = "docs/decisions/0019-code-blocks-are-opaque.md"

# NRN-349 (BOM recognition): a leading UTF-8 BOM before the `---` fence no longer
# hides the frontmatter. The oracle reads a BOM'd doc as frontmatter-less (its
# fields absent from every query and its body the whole file); the rewrite skips
# the BOM and indexes the block. `edge/bom-doc.md` carries a BOM before an
# otherwise ordinary block. The oracle's BOM-blindness is the corrected defect.
[[entry]]
id = "PD-104"
surface = "get --all-cols (BOM-prefixed frontmatter)"
cases = ["text-edge-bom-doc-all-cols"]
old = "a leading UTF-8 BOM hides the frontmatter: the block is unrecognized, so its fields are absent and the whole file (fences included) is body"
new = "the BOM is skipped before the fence (NRN-349): the frontmatter is recognized and its fields are queryable, and body starts after the closing fence"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-332: `--starts-at` is re-indexed from 1-indexed (with a 0→1 floor) to a
# plain ZERO-indexed offset (default 0). Agents assume zero-indexing; the
# floored 1-indexed convention was the surprising one. `--starts-at 1` now skips
# the first record (returns the SECOND) where the oracle returned the FIRST.
# (Renumbered PD-103 → PD-105 on rebase: the text-layer slate landed PD-103/104.)
[[entry]]
id = "PD-105"
surface = "find --starts-at (paging offset)"
cases = ["read-find-starts-at-zero-indexed-zoo"]
old = "`--starts-at` is 1-indexed with a silent floor (`0` and `1` both mean the first record); `--starts-at 1 --limit 1` returns the first document"
new = "`--starts-at` is a zero-indexed offset, default 0, no floor; `--starts-at 1 --limit 1` skips the first document and returns the SECOND (NRN-332)"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-331: competing flags follow merge-queue semantics — the LAST operation on
# the command line wins — instead of hard-erroring. `--limit` and `--no-limit`
# compete over the effective cap; the oracle rejects the pair, the rewrite
# resolves it last-wins (and desugars to exactly one wire value; `no_limit`
# wins when a raw MCP caller sends both, since JSON has no order).
# (Renumbered PD-104 → PD-106 on rebase: the text-layer slate landed PD-103/104.)
[[entry]]
id = "PD-106"
surface = "find --limit / --no-limit (competing flags)"
cases = ["read-find-limit-nolimit-last-wins-zoo"]
old = "`--limit N --no-limit` is a hard conflict: the oracle exits 2 with `the argument '--limit <N>' cannot be used with '--no-limit'`"
new = "`--limit N --no-limit` is accepted last-wins (NRN-331): `--no-limit` given last wins → unlimited, exit 0. The CLI resolves the order into one wire value; on the wire `no_limit` wins when both arrive"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-356: Markdown-link destinations follow URL-parser rules (RFC 3986 /
# WHATWG). The fragment is split from the RAW reference BEFORE percent-decoding,
# then path and fragment decode SEPARATELY, and a `#^id` fragment classifies as a
# block reference (one resolution semantics with wikilinks). The oracle decoded
# the whole reference first and split afterward, and never modeled a Markdown
# block ref. `edge/url-decode-linker.md` isolates both effects on a text-edge
# probe: `note%23draft.md` (encoded hash) and `url-block-target.md#^blk1` (block
# ref resolving against the sibling's `^blk1`).
[[entry]]
id = "PD-107"
surface = "get --col .outgoing_links,.unresolved_links (Markdown-link split-then-decode + block-ref)"
cases = ["url-edge-decode-split-blockref"]
old = "decode-then-split: `note%23draft.md` decodes first, so the `#` splits it into target `note` + anchor `draft.md` (unresolved target-missing); `url-block-target.md#^blk1` slugifies `^blk1` as a heading anchor, reported anchor-missing"
new = "split-then-decode (NRN-356): the fragment is split off the raw reference before decoding, so `note%23draft.md` stays one path segment named `note#draft.md`; `#^blk1` classifies as a block ref (like the wikilink path) that resolves against the target's `^blk1` block-id (a resolved outgoing link)"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-357: external-vs-local classification of a Markdown destination follows URL
# rules — any valid RFC 3986 scheme (case-insensitive), a protocol-relative
# `//`, or a Windows drive-letter path (normalized to a `file:` URL) is external
# and leaves the link universe. The oracle used a hand-rolled lowercase prefix
# list (`http`/`https`/`mailto`/`#`), so `tel:` / `file:` / `//` / drive letters
# / mixed-case `hTTp:` all leaked through as unresolved local links.
# `edge/url-scheme-linker.md` isolates all five external forms on a text-edge
# probe.
[[entry]]
id = "PD-108"
surface = "get --col .outgoing_links,.unresolved_links (external-vs-local scheme classification)"
cases = ["url-edge-scheme-classification"]
old = "a hand-rolled lowercase prefix list classifies only `http://`/`https://`/`mailto:`/`#` as external; `tel:`, `file:`, protocol-relative `//`, a `C:/…` drive letter, and mixed-case `hTTp://` all fall through as local links, reported unresolved (target-missing)"
new = "URL-rules classification (NRN-357): any case-insensitive RFC 3986 scheme, a protocol-relative `//`, or a Windows drive-letter path is external and excluded from the link model, so none of these destinations appear as links at all; a destination whose first segment contains a colon (e.g. `note:draft.md`) also reads as scheme-qualified and classifies external — disambiguate a literal colon-named vault file with a `./` prefix"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-361 (the soft-landing error doctrine): errors educate, never stop-sign.
# The rewrite's diagnostic surface diverges from the oracle's on stderr — a
# stable, greppable `norn:` headline prefix on every user error, plus soft-
# landing did-you-mean / next-step `hint:` lines via the shared `closest`
# machinery where a near-miss or diagnosis path exists. stdout stays payload-only
# in every format. The isolated `errors` suite pins three shapes of this one
# surface: an unresolvable `--links-to` rejection (prefixed + reworded headline,
# exit 1), a near-miss `--col` facet (a did-you-mean leads the warning, exit 0),
# and a malformed `.norn/config.yaml` (the config rejection gains the `norn:`
# prefix, exit 1 — the previously-deferred malformed-config case, now addable).
# NRN-362 rides along under this entry: `get` now renders records through the
# same resolved palette `find` uses (colorized on a TTY) instead of the donor's
# hardcoded no-color; piped — including this harness — it resolves to off, so the
# byte output is unchanged and no read case diverges on it.
[[entry]]
id = "PD-109"
surface = "read-verb error surface (stderr diagnostics: prefix + wording + hints)"
cases = ["err-links-to-unresolvable-zoo", "err-col-facet-did-you-mean-zoo", "err-malformed-config", "err-unknown-dynamic-field-did-you-mean-zoo"]
old = "a user error prints an unprefixed, terse line to stderr: `no document matched: <t>`, `unknown --col facet '.x' (valid facets: …)`, `invalid config <path>: unknown field …`, `unknown field `titel` — did you mean `title`? (…)` — no `norn:` prefix, no did-you-mean/hint split, no next-step hint"
new = "every user error is a soft landing (NRN-361): a stable `norn:`-prefixed headline (`norn: no document matched path or stem: <t>`, `norn: invalid config <path>: …`, `norn: unknown field `titel``) plus, where a near-miss exists, a leading/standalone did-you-mean `hint:` line (`unknown --col facet '.headngs' — did you mean '.headings'? …`; `hint: did you mean `title`?`) — via the one `closest` heuristic. The unknown-dynamic-field rejection (NRN-367) is this same surface now that the owner-side gate is wired live. stdout stays payload-only in every format"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-365 (grammar-wide last-wins): a repeated scalar flag is merge-queue
# semantics — the last occurrence wins — not a hard error. The single lever is
# clap's `args_override_self` global setting on the root, which propagates to
# every subcommand, so EVERY `ArgAction::Set` flag repeat resolves last-wins
# rather than erroring `ArgumentConflict`. `--limit 5 --limit 1` is the anchor:
# the oracle rejects it (exit 2), the rewrite resolves it to limit 1 (exit 0).
# Repeatable `Append` flags still accumulate; genuine cross-flag conflicts
# (delete's `--allow-broken-links`/`--rewrite-to`) still error.
[[entry]]
id = "PD-110"
surface = "repeated scalar flag (grammar-wide last-wins)"
cases = ["err-repeated-limit-last-wins-zoo"]
old = "a repeated scalar flag is a hard conflict: `find --limit 5 --limit 1` exits 2 with `error: the argument '--limit <N>' cannot be used multiple times`, nothing on stdout"
new = "a repeated scalar flag is last-wins (NRN-365, `args_override_self` on the root propagated to every subcommand): `find --limit 5 --limit 1` resolves to limit 1, exit 0, the single sorted path on stdout"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-388 (unified mutation-warning envelope): the donor's per-kind `--format
# json` warning object is internally inconsistent — `new` tags an unknown field
# `{ "field": …, "kind": "unknown-field" }` while `set` used a different member
# set and casing for the same class — so a consumer must special-case each verb.
# The rewrite emits ONE envelope for every warning kind, `{ code, field?, message
# }`, so a machine parses a single shape. Documented as a deliberate divergence
# at the type itself (`norn-wire::mutate::MutationWarning`); this entry pins the
# first warning-bearing `--format json` parity case. The records short-forms
# match the oracle (a MATCH) and are covered by the records apply cases separately.
[[entry]]
id = "PD-111"
surface = "set/new --format json warning object (unified envelope)"
cases = ["mutate-new-unknown-field-warning-json-zoo", "mcp-tools-call-set-unknown-field-warning-zoo", "mcp-tools-call-new-forecast-zoo"]
old = "the per-kind warning object is inconsistent across verbs/kinds: `new` emits `{ \"field\": \"bogus\", \"kind\": \"unknown-field\" }` (a `kind` discriminator, no message), and other kinds carried different member sets"
new = "one unified envelope for every warning kind (NRN-388): `{ \"code\": \"unknown-field\", \"field\": \"bogus\", \"message\": \"field 'bogus' not declared in schema\" }` — a stable kebab `code`, the optional scoped `field`, and an operator-facing `message` (see `crates/norn-wire/src/mutate.rs`, `MutationWarning`)"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-371 (non-mapping frontmatter promotes): a frontmatter block that parses to
# a YAML null — a bare `null`/`~` scalar or a comment-only block — is an
# initializable EMPTY mapping for a field op, not a hard stop. The donor refuses
# such a `set` (`frontmatter is not a top-level mapping`, exit 2, write-free); the
# rewrite promotes the null block to a clean empty mapping and splices the field
# (a comment-only block keeps its comment). This closes the `new` → `set`
# roundtrip: `new` can leave a defaults-free doc with an empty/null block, and a
# subsequent `set` must succeed on it — a valid input must yield a valid output.
# The two cases are the null-scalar and comment-only forms of the one behavior,
# isolated on the `mutate-edge` fixture. (A genuinely non-promotable block — a
# top-level YAML sequence — still refuses.)
[[entry]]
id = "PD-112"
surface = "set against a null-/comment-only frontmatter block (mapping promotion)"
cases = ["mutate-set-null-block-promote", "mutate-set-comment-block-promote"]
old = "a field `set` against a frontmatter block that parses to YAML null (a bare `null`/`~` scalar block, or a comment-only block) is refused: `error: frontmatter is not a top-level mapping`, exit 2, the document unchanged"
new = "the null block promotes to an empty mapping (NRN-371) and the field splices in, exit 0, the tree mutated (a comment-only block keeps its comment and gains the field after it) — a valid input yielding a valid output, closing the new→set null-frontmatter roundtrip (see `crates/norn-frontmatter/src/frontmatter/edit.rs`)"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-405 (a reviewed plan must execute as declared): a change op's
# `fields.operation` is the value that drives the executor's write dispatch. When
# an authored plan carries an `operation` that DISAGREES with the op's `kind`, the
# oracle silently dispatches by `operation` — executing a different operation than
# the reviewed `kind` declares (plan-then-apply's core promise is that what was
# reviewed is what runs). The pinned case declares `kind: set_frontmatter` but
# carries `operation: remove_frontmatter` for `priority` (absent from
# `notes/alpha.md`): the oracle's silent remove trips `cannot-minimal-edit`. The
# rewrite refuses the mismatch itself, naming both values, before any dispatch —
# closing the silent-reinterpretation hole (see
# `crates/norn-core/src/planner/intent/mod.rs`, the `Change` arm; the typed
# `TypedOpError::OperationKindMismatch` variant in `crates/norn-wire/src/plan.rs`).
[[entry]]
id = "PD-113"
surface = "apply (authored plan: change op `kind` vs `fields.operation` mismatch)"
cases = ["apply-authored-kind-operation-mismatch-refusal-zoo"]
old = "a change op whose `fields.operation` disagrees with its `kind` silently dispatches by `operation`, executing a different operation than the reviewed `kind` declares — `kind: set_frontmatter` + `operation: remove_frontmatter` runs a REMOVE (here tripping `error: cannot minimal-edit frontmatter for notes/alpha.md: field priority not present in frontmatter`, exit 2)"
new = "the mismatch is refused before any dispatch: `error: op.fields.operation 'remove_frontmatter' conflicts with op.kind 'set_frontmatter'`, exit 2, write-free — a reviewed plan must execute as its `kind` declares, so silent reinterpretation is removed"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-405 (malformed-plan diagnostics): a user-authored plan that is malformed —
# an unknown op kind, a structural op missing a required field, a non-object
# `fields`, a `kind`/`operation` mismatch, or a wrong-TYPED `fields` member (e.g.
# `"operation": 5`, a non-bool `"force"`) that fails the change-model decode — is
# a USER error, not a norn bug. The oracle flattens every such typed refusal to
# `internal-error` ("norn has a bug"), a misleading machine-branchable code: a
# consumer that branches on `code` to tell "your plan is malformed, fix it" from
# "norn crashed, file a bug" is misdirected. The rewrite preserves the typed error
# through `anyhow` so the apply envelope carries a real code —
# `unknown-operation-kind` for an unknown kind, `malformed-plan` for the
# missing-field / not-object / mismatch / wrong-typed-member family. Exit 2 is
# unchanged throughout; the message is unchanged for the unknown-kind and
# missing-field cases and, for a wrong-typed-member decode failure, additionally
# names the op kind alongside the underlying decode text (see
# `crates/norn-core/src/apply/envelope.rs`, `from_anyhow`, and the
# `TypedOpError::MalformedFields` variant in `crates/norn-wire/src/plan.rs`).
# Surfaces only under `--format json`, where the envelope's `code` is observable.
[[entry]]
id = "PD-114"
surface = "apply --format json (malformed authored-plan refusal code)"
cases = ["apply-authored-unknown-kind-refusal-json-zoo", "apply-authored-missing-field-refusal-json-zoo", "apply-authored-wrong-typed-field-refusal-json-zoo"]
old = "every malformed-plan refusal flattens to `code: internal-error` (the typed error is discarded, so the envelope cannot distinguish a malformed plan from a norn bug): the unknown-kind and missing-field cases report `internal-error` with their specific message, and a wrong-typed member (`\"operation\": 5`) reports `internal-error` with the bare serde decode text"
new = "the typed error survives to the envelope: an unknown op kind reports `code: unknown-operation-kind`, and the missing-field / non-object / kind-operation-mismatch / wrong-typed-member family reports `code: malformed-plan` — a machine-branchable signal that the plan, not norn, is at fault. Exit 2 unchanged; the unknown-kind and missing-field messages are unchanged, and a wrong-typed-member decode failure additionally names the kind (`op.fields for <kind> could not be decoded: <serde text>`)"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-437 (a section edit must not corrupt valid CommonMark): the section
# resolver derives a section's body start as "the byte after the first newline
# following the heading marker". That corrupts two accepted CommonMark heading
# shapes. (1) A SETEXT heading (`Alpha` underlined by `-----`): the body start
# lands ON the underline, so `replace_section` consumes it (demoting the heading
# to a paragraph) and `insert_after_heading` pushes text between the title and
# its underline (dragging the inserted line under the heading). (2) A heading at
# EOF with no trailing newline (`## Tail`): body_start == end == len, so an op
# inserting body content welds it onto the marker (`## Tail- item`) — for that
# shape `replace_section` welds too, since the empty section runs to EOF. The
# oracle shares both bugs. The rewrite derives the body start from the parser's
# heading construct end (which covers the SETEXT underline) and, for the
# EOF-no-newline shape, supplies the missing line terminator before inserted
# content — so the heading survives the edit. All five cases exit 0 on both
# sides; stdout (the `body: X → Y bytes` line) and the post-state tree diverge.
# The remaining section ops on these shapes agree with the oracle and are covered
# by the in-crate regression tests, not gated here: `delete_section` (both
# shapes — it keys off `heading_start`/`end`, never `body_start`),
# `insert_before_heading` (both shapes — it inserts at `heading_start`), and
# `append_to_section` on the SETEXT shape (the underline is reinserted in place,
# so the append happens to match). See `crates/norn-frontmatter/src/section.rs`
# (the resolver + `body_offset`) and `crates/norn-core/src/edit/transform.rs`
# (the EOF separator).
[[entry]]
id = "PD-115"
surface = "edit (section ops on SETEXT / heading-at-EOF body shapes)"
cases = ["edit-setext-replace-section-diverge", "edit-setext-insert-after-heading-diverge", "edit-eof-heading-replace-section-diverge", "edit-eof-heading-append-to-section-diverge", "edit-eof-heading-insert-after-heading-diverge"]
old = "the section body start is the byte after the heading marker's first newline: on a SETEXT heading it lands on the underline, so `replace_section` deletes the underline (`Alpha\\n-----\\nBody` → `Alpha\\nREPLACED.`) and `insert_after_heading` inserts above it (the underline then applies to the inserted line); on a heading at EOF with no trailing newline (`## Tail`) the empty section runs to EOF, so `replace_section`, `append_to_section`, and `insert_after_heading` all weld their content onto the marker (`## Tail` + `NEW.` → `## TailNEW.`; `## Tail` + `- item` → `## Tail- item`)"
new = "the body start is the parser's heading-construct end (past the SETEXT underline), and an op inserting body content after a heading with no trailing newline emits the missing line terminator first (NRN-437): the SETEXT underline is preserved (`Alpha\\n-----\\nREPLACED.` / the inserted line lands below the underline) and the EOF heading stays a heading (`## Tail\\nNEW.` / `## Tail\\n- item`) — a valid CommonMark heading survives the edit"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# NRN-424 (one span-based wikilink rewriter): three independent `[[..]]`
# rewriters disagreed with the authoritative parser (`parse_wikilinks`, which is
# code-opaque per ADR 0019 and splits a block ref only on `#^`). The rewrite
# unifies them onto a single span-based engine driven by the parser's tokens, so
# only real parsed links rewrite and the embed marker / alias / anchor survive by
# construction. The oracle shares all three bugs, so each fix diverges on its
# backlink shape (post-state tree; stdout matches — the plan/report is computed
# the same on both sides). Grouped by mechanism below. See
# `crates/norn-frontmatter/src/wikilink.rs` (`splice_wikilinks` /
# `reconstruct_wikilink`), `crates/norn-core/src/standards/repair/link_risk.rs`
# (the cascade rewrite), and `crates/norn-core/src/standards/apply.rs`
# (`apply_rewrite_link` / `rewrite_one_backlink`).

# PD-116 — NRN-431: the move/delete cascade dropped an embed's `!` and `|alias`.
# Both cascade entry points are pinned: a `move` (the stem-only rewrite) and a
# `delete --rewrite-to` (the redirect), which share the same cascade helpers.
[[entry]]
id = "PD-116"
surface = "move / delete --rewrite-to (backlink cascade over an embed reference)"
cases = ["wl-move-embed-backlink-diverge", "wl-delete-embed-backlink-diverge"]
old = "the cascade rewrites an embed backlink with a `raw.strip_prefix(\"[[\")` that misses the leading `!` of `![[…]]`: the inner collapses and the whole embed is replaced by a bare wikilink, dropping the `!` AND the `|alias` (`![[embed-target|Display]]` → `[[embed-moved]]` on a move; → `[[redirect-target]]` on a delete redirect)"
new = "the cascade rebuilds the link through the parser (`reconstruct_wikilink`), preserving the embed marker and the alias: `![[embed-target|Display]]` → `![[embed-moved|Display]]` (move) / `![[redirect-target|Display]]` (delete redirect)"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# PD-117 — NRN-432: neither applier respected code opacity. Same mechanism (a
# code-fenced `[[old]]` is literal sample text), two engines: the move cascade's
# first-occurrence `replacen` and the rewrite-wikilink verb's whole-file scan.
[[entry]]
id = "PD-117"
surface = "move / rewrite-wikilink (a code-fence-shadowed backlink)"
cases = ["wl-move-code-fence-shadow-diverge", "wl-rewrite-wikilink-code-fence-shadow-diverge"]
old = "the rewriters are not code-opaque: with a fenced `[[fence-target]]` sample ABOVE the real prose backlink, the move cascade's `replacen(raw, .., 1)` rewrites the FIRST file occurrence (the fenced sample) and leaves the real prose link dangling, and the rewrite-wikilink verb's whole-file `find(\"[[\")` scan rewrites BOTH the fenced sample and the prose link"
new = "both route through the code-aware parser (`parse_wikilinks`), which excludes fenced / inline-code ranges (ADR 0019): the fenced sample is never touched and only the real prose backlink is rewritten"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# PD-118 — NRN-433: the rewrite-wikilink verb split the target on a bare `^`.
[[entry]]
id = "PD-118"
surface = "rewrite-wikilink (a target stem carrying a bare `^`)"
cases = ["wl-rewrite-wikilink-caret-stem-diverge"]
old = "`split_target_suffix` splits the target at the first `#` OR `^`, but a bare `^` is an ordinary filename character per the parser (a block ref is `#^id`). So `rewrite-wikilink 'a^b' caret-renamed` matches the pre-`^` fragment `a` against the target `a^b`, never rewrites, and leaves `[[a^b]]` untouched while reporting success"
new = "matching uses the parser's decomposition (split on `#` only), so the whole `a^b` target matches and `[[a^b]]` is rewritten to `[[caret-renamed]]`"
reason = "discovered-inconsistency"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# PD-119 — NRN-424 (decided-better): interior-whitespace canonicalization on
# rewrite. The unified rewriter reconstructs a link from the parser's decomposed
# (trimmed) target and alias, so a backlink carrying interior whitespace — space
# around the `|` pipe, or leading/trailing padding inside the `[[ ]]` — is
# rewritten to its canonical tight form. This is DECIDED-BETTER, not a bug to
# preserve: byte-parity would require replicating the oracle's OWN inconsistency
# (its ad-hoc rewriters drop the target-side space but keep the alias-side space),
# and the padded-target case additionally FIXES a phantom no-op — the oracle's
# `rewrite-wikilink` compares an untrimmed `bare_target` (` padded-target `)
# against the trimmed plan target (`padded-target`), never matches, and leaves the
# file untouched while reporting success (the same family as the caret bug,
# PD-118). Both cases exit 0 on both sides; the plan/report matches, the
# post-state tree diverges. See `crates/norn-frontmatter/src/wikilink.rs`
# (`reconstruct_wikilink`).
[[entry]]
id = "PD-119"
surface = "move / rewrite-wikilink (a backlink with interior whitespace)"
cases = ["wl-move-spaced-alias-diverge", "wl-rewrite-wikilink-padded-target-diverge"]
old = "the ad-hoc rewriters preserve a link's interior whitespace verbatim, inconsistently: a move cascade over `[[spaced-target | Display Name]]` drops the target-side space but keeps the alias-side space (`[[spaced-moved| Display Name]]`), and `rewrite-wikilink` over `[[ padded-target ]]` matches its untrimmed `bare_target` against the trimmed plan target, so it never rewrites and leaves the link untouched while reporting success"
new = "the reconstructed link emits the parser-trimmed target and alias, canonicalizing interior whitespace: `[[spaced-target | Display Name]]` → `[[spaced-moved|Display Name]]`, and `[[ padded-target ]]` matches on the trimmed target and rewrites to `[[padded-renamed]]` (the phantom no-op is fixed)"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# PD-120 — NRN-424 (decided-better): refuse/skip a rename to an UNREPRESENTABLE
# wikilink target. A target carrying a wikilink delimiter (`|`/`#`/`[`/`]`) cannot
# be emitted as `[[target]]` without re-parsing as a DIFFERENT link — `[[a|b]]`
# reads as target `a`, alias `b` — silently corrupting the backlink on a rename to
# such a filename. Neither move nor rewrite-wikilink refuses such a destination
# upstream (a `|` is a legal POSIX filename byte), so this is REACHABLE, not
# defense-in-depth. The oracle emits the corrupt link; the rewrite refuses (the
# verb, exit 2, `unrepresentable-rewrite-target`) or skips (the cascade,
# `would-corrupt-wikilink`, leaving the link stale-but-intact and detectable by
# `validate`) — the same recoverable posture as would-corrupt-frontmatter. See
# `crates/norn-frontmatter/src/wikilink.rs` (`wikilink_target_is_representable` /
# `reconstruct_wikilink`) and `crates/norn-core/src/standards/apply.rs`.
[[entry]]
id = "PD-120"
surface = "rewrite-wikilink / move (rename to an unrepresentable wikilink target)"
cases = ["wl-rewrite-wikilink-unrepresentable-refusal", "wl-move-unrepresentable-skip-diverge"]
old = "a rename whose new target carries a `|`/`#`/`[`/`]` is emitted verbatim, so the backlink re-parses as a different link and is silently corrupted: `[[unrepr-target]]` becomes `[[a|b]]` (which reads as target `a`, alias `b`) on both the rewrite-wikilink verb (exit 0) and the move cascade (exit 0)"
new = "the target is checked for representability first: the rewrite-wikilink verb REFUSES the whole op (exit 2, `unrepresentable-rewrite-target`, write-free) and the move cascade SKIPS the backlink (`would-corrupt-wikilink`), leaving `[[unrepr-target]]` intact and detectable by `validate` rather than corrupted"
reason = "decided-better"
decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"

# PD-121 — ADR 0022 (decided-better): strict op-payload decode. Every migration
# op payload is a typed struct decoded ONCE, strictly — a present-but-wrong-typed
# field refuses with a precise `malformed-plan` code, never coerces to a silent
# default. The oracle indexes the raw `fields` map with lossy accessors
# (`.and_then(as_bool).unwrap_or(false)`, `.and_then(as_str).unwrap_or("")`,
# `.and_then(as_str)` dropping a non-string to `None`), so a fat-fingered field
# type is swallowed and the op proceeds on a coerced value — in the
# `delete_document` case, silently applying a destructive delete the author never
# authorized. The rewrite refuses the malformed field at plan decode, before any
# dispatch, so a reviewed plan cannot execute on a value its author did not write.
# See `crates/norn-wire/src/plan.rs` (`TypedOp::try_from`, the `bool_field` /
# `rewrite_to` decoders and the `ChangeFields` / `EditFields` structs).
[[entry]]
id = "PD-121"
surface = "apply (authored plan: wrong-typed op field — strict decode)"
cases = ["apply-authored-wrong-typed-bool-refusal-zoo", "apply-authored-wrong-typed-rewrite-to-refusal-zoo", "apply-authored-wrong-typed-document-hash-refusal-zoo"]
old = "a present-but-wrong-typed op field is silently coerced to a default: `move_document`'s `\"force\": \"true\"` (a string) becomes `false` (then refusing `move destination already exists`, exit 2); `delete_document`'s `\"rewrite_to\": 5` (a number) is dropped to no-redirect, DELETING the document with its backlinks left broken (exit 0, mutating); `str_replace`'s `\"document_hash\": 5` becomes `\"\"` (no compare-and-swap), then refusing `string not found` (exit 2) — the malformed field is invisible in every case"
new = "each wrong-typed field refuses at plan decode with `code: malformed-plan` and a message naming the field (`op.fields for <kind> could not be decoded: field \\`force\\` must be a boolean` / `field \\`rewrite_to\\` must be a string` / `invalid type: integer \\`5\\`, expected a string`), exit 2, write-free — a reviewed plan never executes on a coerced value, so the delete-with-typo data loss the oracle silently applies is refused"
reason = "decided-better"
decision = "docs/decisions/0022-typed-plan-payloads-flat-finding-contract.md"

# PD-122 — ADR 0022 (decided-better): the flat finding contract. Validation
# findings serialize as one flat, closed struct — `{ path, code, severity,
# message, rule?, field?, target?, candidates?, next_actions? }` — across the CLI
# JSON path and the MCP tool. The oracle serialized an untagged per-variant body
# flattened onto the finding, leaking the internal link-resolution model wholesale
# (`link: { raw, kind, source_span, source_context, resolved_path,
# unresolved_reason, candidates, status, … }`) and the variant-specific
# frontmatter detail (`allowed_values`, `actual_value`, `max_length`,
# `allowed_paths`, …) into user-facing output, with `path`/`target`/`candidates`
# as internal path types. The rewrite projects onto the closed contract: the link
# model collapses to plain-string `candidates` + a `target`, variant detail whose
# decision value mattered folded into `message` at construction (e.g. the length
# bounds `(7 > 5)`) and otherwise dropped, and field order is `path`-first with
# absent optionals omitted (not serialized as `null`). No compatibility shim in
# the pre-1.0 break window. Covers the CLI `--format json` and `--format jsonl`
# single-code shapes and the MCP `vault.validate` structuredContent that follows
# them. See `crates/norn-wire/src/finding.rs` (the flat `Finding` / `Severity`)
# and `crates/norn-core/src/standards/findings.rs` (`Finding::to_wire`).
[[entry]]
id = "PD-122"
surface = "validate --format json / jsonl + vault.validate (per-finding shape)"
cases = ["validate-code-filter-zoo", "validate-jsonl-code-zoo", "mcp-tools-call-validate-code-zoo"]
old = "each finding serializes an untagged per-variant body flattened onto `{code, severity, path, message}`: a link finding embeds the whole internal `link` model (raw, kind, spans, source_context, resolved_path, unresolved_reason, status, and `candidates` as path objects); a frontmatter finding emits its variant fields (`rule` even when `null`, `field`, plus `allowed_values` / `actual_value` / `max_length` / `allowed_paths` / … as applicable) — an output shape that is an accident of internal representation"
new = "each finding serializes the flat closed contract `{ path, code, severity, message, rule?, field?, target?, candidates?, next_actions? }`: `path`-first field order, absent optionals omitted rather than `null`, `candidates` as plain vault-path strings, no internal `link` / diagnostic model and no variant-specific frontmatter fields — the detail that carried fix-vs-skip value folded into `message`, the rest dropped"
reason = "decided-better"
decision = "docs/decisions/0022-typed-plan-payloads-flat-finding-contract.md"

# NRN-427 / NRN-428 (ADR 0023, decided-better): query predicate input strictness.
# The pinned oracle accepts two unparseable predicate inputs silently, both at
# exit 0. (1) A date-operator value substitutes only the literal `today`;
# everything else passes verbatim into a TEXT lexical compare, so `--before
# created:yesterday` becomes `created < 'yesterday'` — and since 'y' sorts after
# any '2026-…' ISO date, it matches every stored date (a wrong result, not an
# error). (2) A `--path` glob is never validated: `PathPattern::parse` errors are
# `.ok()`-discarded in the per-document post-pass, so `{unclosed` filters out
# every doc — an empty result indistinguishable from a real no-match. The rewrite
# refuses both at the single `build_document_query` seam (covering find / count /
# describe, direct + owner-routed) with exit 2: the date refusal names the
# operator, the value, and the accepted forms (`today` / ISO 8601 date / ISO 8601
# datetime); the glob refusal names the bad pattern and why. One entry, one
# surface: query predicate input that cannot be parsed refuses rather than
# silently computing a wrong or empty result set. See
# `crates/norn-core/src/query/filter_args.rs` (`parse_field_date` +
# `is_iso_date_or_datetime`, and the up-front `--path` glob validation).
[[entry]]
id = "PD-123"
surface = "find/count query predicate input validation (date value + --path glob)"
cases = ["read-find-bad-date-value-refuses-clean", "read-find-malformed-path-glob-refuses-clean"]
old = "an unparseable predicate value is accepted silently at exit 0: a non-`today` date value passes verbatim into a TEXT lexical compare (`--before created:yesterday` → `created < 'yesterday'`, which matches every stored ISO date), and a malformed `--path` glob (`{unclosed`) has its parse error discarded so it filters out every document (an empty result set, indistinguishable from a real no-match)"
new = "each unparseable predicate input refuses at `build_document_query` with exit 2: a date value that is neither `today` nor a valid ISO 8601 date/datetime reports `invalid --before date value 'yesterday': expected \\`today\\`, an ISO 8601 date (YYYY-MM-DD), or an ISO 8601 datetime`, and a malformed `--path` glob reports `invalid --path glob '{unclosed': <reason>` — no silently-wrong or silently-empty result set"
reason = "decided-better"
decision = "docs/decisions/0023-query-predicate-strictness.md"

# NRN-426 (ADR 0023 amendment 2026-07-22): predicate value TYPING. The pinned
# oracle eagerly types every parseable `--eq`/`--not-eq`/`--in`/`--not-in` value
# (`true`/`false`/i64/f64) before SQL, so a numeric-looking token never equals a
# quoted stored value: `--eq zip:07030` silently returns zero, and `--not-eq
# zip:07030` RETURNS the doc the user meant to exclude (the corrupting
# direction). The rewrite makes the schema the type authority where declared and
# dual-types undeclared/disagreeing fields (match either representation); a
# value-comparison predicate on a declared date/datetime field with a non-ISO
# value refuses (exit 2), extending the ADR 0023 strictness class. The zoo fixture
# alpha doc carries `zip: "07030"` (a quoted, zero-padded value) to exercise the
# match/exclude divergence; `due` is schema-declared `date` and drives the refusal.
[[entry]]
id = "PD-124"
surface = "find value-comparison predicate typing (--eq/--not-eq on quoted numeric; declared-date refusal)"
cases = ["read-find-eq-numeric-quoted-value-zoo", "read-find-not-eq-numeric-quoted-value-zoo", "read-find-declared-date-eq-refuses-zoo"]
old = "value-comparison predicates eager-type the token before SQL: `--eq zip:07030` coerces to the integer 7030, which never equals the stored string \"07030\" (zero results, exit 0 — a silent miss); `--not-eq zip:07030` likewise finds \"07030\" != 7030 and returns the doc the user meant to exclude; a non-ISO value on a value operator against a declared-date field lexically compares as a string (zero results, exit 0)"
new = "the schema is the type authority where declared and undeclared/disagreeing fields dual-type: `--eq zip:07030` matches either the string \"07030\" or the number 7030 (returns alpha); `--not-eq zip:07030` excludes either representation (drops alpha, returns every other doc; docs missing the field stay included); a value-comparison predicate on the declared-date `due` field with a non-ISO value refuses at exit 2 naming the field, the declared type, and the value"
reason = "decided-better"
decision = "docs/decisions/0023-query-predicate-strictness.md"

# NRN-436 (ADR 0022 amendment, discovered-inconsistency): coded refusals across
# the apply envelope. Several authored-plan refusals were bare `anyhow::bail!`
# invisible to the apply envelope's downcast ladder, so the oracle flattens every
# one to `code: internal-error` ("norn has a bug") — a misleading machine-branchable
# signal for what is a malformed AUTHORED plan (a user fault). The rewrite gives
# each user-fault family a typed error carrying a precise code: the create-guard
# family reports `create-destination-exists` / `create-parent-missing` (and adds a
# `path` echo), a `new_value.frontmatter` that is not an object reports
# `malformed-plan`, an owner-set precondition-validation fault (empty selector,
# duplicate id, missing named op, unparseable eq predicate) reports
# `invalid-precondition`, and a plan-structure fault (duplicate op id, create path
# with no stem, edit payload missing/undecodable) reports `malformed-plan`. Exit 2
# and the message text are UNCHANGED on both sides; only the `code` (and, for the
# create-guard family, an added `path`) diverges. `internal-error` is now reserved
# for genuine norn defects, and the families register once behind a guard test
# (`crate::apply::envelope`). Surfaces only under `--format json`, where the
# envelope `code` is observable. See `crates/norn-core/src/standards/apply.rs`
# (`ApplyError` create-guard variants + `PlanStructureError`),
# `crates/norn-core/src/apply/preconditions.rs` (`PreconditionError`), and
# `crates/norn-core/src/apply/envelope.rs` (`from_anyhow` / the `CodedError`
# registry).
[[entry]]
id = "PD-125"
surface = "apply --format json (bare-anyhow user-fault refusal codes)"
cases = ["apply-authored-create-destination-exists-refusal-json-zoo", "apply-authored-create-parent-missing-refusal-json-zoo", "apply-authored-create-nonobject-frontmatter-refusal-json-zoo", "apply-authored-empty-stem-precondition-refusal-json-zoo", "apply-authored-duplicate-op-id-refusal-json-zoo"]
old = "every one of these refusals flattens to `code: internal-error` (the bare `anyhow` carries no typed code, so the apply envelope cannot distinguish a malformed plan from a norn bug): a create into an existing destination, a create into a missing parent dir, a create with a non-object `new_value.frontmatter`, an owner-set precondition with an empty stem selector, and two ops sharing an id all report `internal-error` with their specific message and no `path`"
new = "each refusal carries a typed, machine-branchable code: `create-destination-exists` and `create-parent-missing` (both additionally echoing the offending vault-relative `path`), `malformed-plan` for the non-object frontmatter and the duplicate op id, and `invalid-precondition` for the empty stem selector — `internal-error` is reserved for genuine norn defects. Exit 2 and every message are unchanged"
reason = "discovered-inconsistency"
decision = "docs/decisions/0022-typed-plan-payloads-flat-finding-contract.md"

# NRN-406 (ADR 0024, decided-better): the one-applier fold records each op's
# outcome truly instead of reconstructing it from the telemetry event log. The
# pinned oracle's event-reconstruction UNDER-COUNTS a two-op `{{seq}}` create:
# it mis-marks op0 `skipped`, so the created-doc lockstep hands op0's resolved
# path to op1 and `seq/task-2.md` never appears in the report — `applied: 1
# skipped: 1`, both summaries reading `seq/task-1.md` — even though the vault
# tree correctly carries BOTH files. This is the NRN-425 report-rendering defect.
# The rewrite reports the truth: `applied: 2` with the two distinct resolved
# paths. Post-state is UNCHANGED (both binaries land task-1 + task-2); only the
# report (op0/op1 status + the second summary's path) diverges, now matching
# disk. See `crates/norn-core/src/apply/passes.rs` (`OpTracker`) and
# `crates/norn-core/src/apply/executor.rs` (`build_report_ops`).
[[entry]]
id = "PD-126"
surface = "apply --yes (multi-seq-create report: true per-op status vs event reconstruction)"
cases = ["apply-authored-sequenced-seq-creates-zoo"]
old = "the report reconstructs per-op status from the event log and under-counts: op0 is mis-marked `skipped` and the created-doc lockstep hands its resolved path to op1, so the summary reads `applied: 1  skipped: 1` with BOTH create lines printing `create seq/task-1.md` — `seq/task-2.md` never appears — despite both files landing on disk"
new = "the applier records each op's outcome as it happens, so the report tells the truth: `applied: 2  skipped: 0` with the two distinct resolved summaries `create seq/task-1.md` and `create seq/task-2.md` — matching the (unchanged) post-state"
reason = "decided-better"
decision = "docs/decisions/0024-one-applier-repair-as-planner.md"

# NRN-406 (ADR 0024, decided-better): partial apply is the semantics. A per-op
# failure no longer aborts the remaining plan — independent ops proceed, the
# failed op records `failed`, and only its dependents record `not_run`. A
# three-create plan whose middle op's parent dir is missing (no `--parents`)
# fails AFTER op0 has written, so both binaries exit 1 (a truthful partial
# failure, never a byte-identical refusal). The oracle aborts at the failure
# (op2 `not_run`, only `nrn406-first.md` lands); the rewrite runs the independent
# op2 (`applied`, `nrn406-third.md` also lands). The op2 status, the
# applied/remaining counters, AND the post-state (the extra `nrn406-third.md`)
# diverge. See `crates/norn-core/src/apply/passes.rs` (per-pass `gate_blocked` +
# per-op recording) and ADR 0024's "partial apply is the semantics" invariant.
[[entry]]
id = "PD-127"
surface = "apply --yes (independent files proceed after a per-op failure)"
cases = ["apply-authored-independent-files-proceed-zoo"]
old = "the applier aborts the whole plan at the first per-op failure: op0 `applied`, op1 `failed` (create-parent-missing), op2 `not_run` — `applied: 1  remaining: 1`, exit 1 — and only `nrn406-first.md` lands on disk"
new = "the failed op is recorded and INDEPENDENT ops still run: op0 `applied`, op1 `failed`, op2 `applied` — `applied: 2  remaining: 0`, exit 1 — and both `nrn406-first.md` and `nrn406-third.md` land on disk (a truthful partial apply)"
reason = "decided-better"
decision = "docs/decisions/0024-one-applier-repair-as-planner.md"

# NRN-151 (ADR 0024, decided-better): destructive/structural ops carry a
# plan-time compare-and-swap hash, and a delete's hash is REQUIRED. A
# hand-authored `delete_document` op with no `document_hash` cannot fingerprint
# the file before removing it — a fail-open removal — so the rewrite refuses it
# `delete-hash-required` (exit 2) at a plan-level barrier before any write. The
# oracle has no such requirement: a hash-less authored delete forecasts (and,
# confirmed, would apply). Only hand-authored hash-less deletes newly refuse —
# the verbs and repair always stamp the hash — and there is no compatibility
# shim in the pre-1.0 break window. Surfaces on a dry-run `apply --format json`:
# exit code and output diverge, both write-free. See
# `crates/norn-core/src/apply/executor.rs` (`first_delete_missing_hash`) and
# `crates/norn-core/src/standards/apply.rs` (`PlanStructureError::DeleteHashRequired`).
[[entry]]
id = "PD-128"
surface = "apply --format json (hand-authored hash-less delete refusal)"
cases = ["apply-authored-delete-hash-required-refusal-json-zoo"]
old = "a `delete_document` op with no `document_hash` is accepted: the delete forecasts `outcome: applied` (exit 0) and, confirmed, removes the file with no compare-and-swap against its bytes"
new = "the op is refused fail-closed: `code: delete-hash-required` naming the offending path (exit 2), at a plan-level barrier before any write — a delete must carry the plan-time hash it will compare-and-swap"
reason = "decided-better"
decision = "docs/decisions/0024-one-applier-repair-as-planner.md"

# NRN-151 (ADR 0024, decided-better): a `move_document` op now carries an
# OPTIONAL plan-time `document_hash`, and when present it is a pre-rename
# compare-and-swap. A stale hash (one that no longer matches the source bytes)
# refuses `stale-document-hash` before the move lands — the move CAS the donor
# never had (the donor fingerprints deletes and content ops but never a move, so
# a move against a drifted source proceeded silently). Move CAS stays optional:
# an absent hash proceeds unchecked; only a present-but-stale hash refuses.
# Surfaces on a dry-run `apply --format json`: exit code and output diverge, both
# write-free. See `crates/norn-core/src/apply/passes.rs` (`move_pass` pre-rename
# `fingerprint_vacate`) and `crates/norn-core/src/mutate/move_doc.rs` (plan-time
# hash stamping).
[[entry]]
id = "PD-129"
surface = "apply --format json (move stale-hash refusal — the new optional move CAS)"
cases = ["apply-authored-move-stale-hash-refusal-json-zoo"]
old = "a `move_document` op is never fingerprinted, so a plan-time `document_hash` that no longer matches the source is ignored: the move forecasts `outcome: applied` (exit 0) and, confirmed, renames the drifted file anyway"
new = "a present `document_hash` is a pre-rename compare-and-swap: a stale hash refuses `stale-document-hash` (exit 2) before the rename, the same drift-refusal class the delete and content paths already enforce (an absent hash still proceeds unchecked)"
reason = "decided-better"
decision = "docs/decisions/0024-one-applier-repair-as-planner.md"

# NRN-164 (ADR 0010, decided-better): the section resolver accepts ATX-prefixed
# heading anchors. It tries the anchor EXACTLY first (preserving every working
# anchor, including heading text that legitimately begins with `#`), then — only
# on a total miss, and only for an ATX-prefixed anchor (1-6 `#` + a space) —
# retries on the heading TEXT with the prefix and any trailing closer stripped.
# Level is syntax noise (a `## X` anchor resolves a `### X` heading). Silent
# acceptance, per ADR 0010's forgiving-inputs doctrine. The oracle's resolver
# requires the bare heading text and refuses the markdown form (`## X`) that
# agents and humans naturally pass. All edit consumers inherit the fix through
# the single resolver. See `crates/norn-frontmatter/src/section.rs`
# (`resolve_section_in` exact-first + `atx_anchor_text`).
[[entry]]
id = "PD-130"
surface = "edit --yes (forgiving ATX-prefixed heading anchor)"
cases = ["edit-atx-prefixed-heading-anchor-diverge"]
old = "the section resolver requires the bare heading text: a `replace_section` anchored on the natural markdown form `## Section One` refuses `heading not found: \"## Section One\"` (exit 2), write-free"
new = "the resolver tries the anchor exactly, then strips a leading ATX prefix (and any trailing closer) on the miss and matches on heading TEXT (level is syntax noise): `## Section One` resolves the `Section One` section and the edit applies (exit 0)"
reason = "decided-better"
decision = "docs/decisions/0010-cli-grammar-forgiving-inputs.md"

