# Divergence ledger (ADR 0018): every intended old->new behavior difference,
# decision-gated. The parity runner passes a differing case ONLY when an
# entry here covers it; a differing case with no entry is drift (CI fails).
# An entry whose cases all currently MATCH is stale and fails the run —
# entries cannot rot.
#
# Format:
#
# [[entry]]
# id = "PD-001"                      # stable, never reused
# surface = "find --format json"     # human-readable surface name
# cases = ["find-json-basic"]        # explicit case ids the entry covers
# old = "what the oracle does"
# new = "what the rewrite does"
# reason = "decided-better"          # or "discovered-inconsistency"
# decision = "docs/decisions/0018-greenfield-rewrite-oracle-parity.md"
#
# Runner-side rules (crates/norn-parity/src/ledger.rs), all enforced:
# - Unknown `reason`, a missing required field, a duplicate entry id, or an
#   entry citing an unknown case id is a load error (runner exit 2).
# - An entry may only cite cases whose surface is already ported (the case's
#   own `ported` flag). Divergence can only be observed on a ported surface,
#   so an entry for an unported one is premature — a load error (exit 2).
# - A case cited by more than one entry is also a load error — a Diverged
#   verdict must resolve to exactly one entry.
# - meta.oracle_version must match the oracle binary's actual `--version`
#   output, or the run aborts (exit 2) rather than silently comparing
#   against an unpinned or floated oracle. Enforced by the comparison modes
#   AND by --consistency (a pin-scoped trust claim); --self-check is
#   ledger-blind (no ledger, no pin) so a case set can be vetted against a
#   new oracle before the ledger is updated.

[meta]
oracle_version = "0.48.0"   # the pinned oracle; the runner verifies `--version` against this

# The registered-vault namespace (ADR 0017) is a new-world surface the pinned
# oracle (0.48) predates. It appears in the top-level `--help` COMMANDS list as
# one extra `vault` row after every ported oracle command. The addressing
# rework (NRN-345) additionally reshapes the GLOBAL OPTIONS block on EVERY
# command: the global `--config` is deleted (per-vault config is resolver-derived
# under ADR 0017, `[vaults.<name>].config -> <root>/.norn/config.yaml`, not a
# free-floating global path) and the `--vault NAME` global is unhidden (the
# summoner consumes it to pick the routed vault). help-bare carries both the
# command-list and the global-options change; help-validate / help-find carry
# only the global-options change. Live help examples (the "--help builds the
# cache" behavior) do NOT diverge: under the harness the oracle opens a
# freshly-created empty cache and emits none, matching the rewrite.
[[entry]]
id = "PD-101"
surface = "--help (top-level command list + GLOBAL OPTIONS)"
cases = ["help-bare"]
old = "the 22-command list ends at `audit` with no registered-vault namespace; GLOBAL OPTIONS lists `--config` and has no `--vault`"
new = "a `vault` namespace (register/unregister/list/set) is listed after `audit`, exposing the ADR 0017 registry; GLOBAL OPTIONS drops `--config` and adds `--vault NAME`"
reason = "decided-better"
decision = "docs/decisions/0017-registered-vaults-summoned-owners.md"

# The per-command GLOBAL OPTIONS change (NRN-345) on the two ported subcommand
# help surfaces. Both drop `--config` and gain `--vault NAME`; neither has a
# command list, so the GLOBAL OPTIONS block is their sole divergence.
[[entry]]
id = "PD-102"
surface = "<command> --help (GLOBAL OPTIONS block)"
cases = ["help-validate", "help-find"]
old = "GLOBAL OPTIONS lists `--config <YAML config file>` and has no `--vault`"
new = "GLOBAL OPTIONS drops `--config` (config is resolver-derived under ADR 0017) and adds `--vault NAME` (registered-vault targeting the summoner consumes)"
reason = "decided-better"
decision = "docs/decisions/0017-registered-vaults-summoned-owners.md"
