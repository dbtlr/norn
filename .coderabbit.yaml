# CodeRabbit configuration.
#
# IMPORTANT: the presence of this file overrides the CodeRabbit dashboard
# settings, and reviews.auto_review.base_branches defaults to the repository
# default branch ONLY. The rewrite line (ADR 0018) is a long-lived integration
# branch carrying the same review gates as main, so auto reviews are extended
# to it explicitly here. A PR based on another feature branch (a stacked PR)
# is not auto-reviewed until it is retargeted onto a listed base.
#
# docs/parity-ledger.toml is excluded from review: its comment-block-above-
# [[entry]] layout has drawn the identical "duplicate [[entry]] header" false
# positive on seven consecutive PRs (once escalated to Critical). The file is
# structurally guarded where it matters — the parity ledger loader rejects
# duplicate ids, empty entries, and unknown case references, and
# crates/norn-parity/tests/ledger.rs pins the entry count — so review of this
# file adds noise, not safety.
reviews:
  auto_review:
    base_branches:
      - "rewrite/.*"
  path_filters:
    - "!docs/parity-ledger.toml"
